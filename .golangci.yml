version: "2"
run:
  relative-path-mode: wd
linters:
  default: none
  enable:
    - depguard
    - errcheck
    - godox
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    depguard:
      rules:
        # Production code: stdlib only. cond is a pure-stdlib leaf library.
        main:
          files:
            - $all
            - "!$test"
          allow:
            - $gostd
        # Test files: stdlib plus the package itself (external test package
        # `cond_test` imports `github.com/bold-minds/cond`).
        tests:
          files:
            - $test
          allow:
            - $gostd
            - github.com/bold-minds/cond
    errcheck:
      check-type-assertions: true
    govet:
      disable:
        - fieldalignment
      enable-all: true
      settings:
        shadow:
          strict: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - godot
        source: (noinspection|TODO)
      - linters:
          - gocritic
        source: //noinspection
      - linters:
          - bodyclose
          - dupl
          - errcheck
          - funlen
          - goconst
          - gosec
          - noctx
          - wrapcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      # examples/ holds godoc Example functions — prose, not prod code.
      # They intentionally use weak assertions and short-form patterns
      # to stay readable on pkg.go.dev. Linting them produces churn
      # without catching bugs in the library itself.
      - examples$
issues:
  max-same-issues: 50
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      # examples/ holds godoc Example functions — prose, not prod code.
      # They intentionally use weak assertions and short-form patterns
      # to stay readable on pkg.go.dev. Linting them produces churn
      # without catching bugs in the library itself.
      - examples$
