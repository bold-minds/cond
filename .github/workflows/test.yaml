name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        go: [ '1.21', 'stable' ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Install dependencies
        run: go mod download

      # Build validation (cross-platform).
      # Conditionally diffs go.sum only if present — pure-stdlib children have none.
      - name: Build validation
        shell: bash
        run: |
          go build ./...
          go mod tidy
          git diff --exit-code go.mod
          if [ -f go.sum ]; then
            git diff --exit-code go.sum
          fi

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: go test -v -coverprofile="coverage.out" ./...

      - name: Enforce coverage floor
        if: runner.os != 'Windows'
        shell: bash
        run: |
          threshold=80
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "coverage: ${pct}% (floor ${threshold}%)"
          awk -v p="$pct" -v t="$threshold" 'BEGIN { exit (p+0 < t+0) }'

      - name: Upload coverage artifact
        if: runner.os != 'Windows' && matrix.go == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.out
          if-no-files-found: error
          retention-days: 7

      - name: Run benchmarks
        run: go test -bench=. -benchmem ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: golangci-lint
        # golangci-lint-action@v7 is required to run golangci-lint v2.
        # v6 of the action only supports v1 binaries and fails with
        # "golangci-lint v2 is not supported by golangci-lint-action
        # v6, you must update to golangci-lint-action v7". The
        # .golangci.yml in this repo uses the v2 config schema, so
        # the action version and binary version must be aligned.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2
          args: --timeout=10m
